name: release

# Release-only cadence. Runs the packaging/consumption checks that are too heavy for the push gate
# and only meaningful at a release: Package.Tests and the generated-product tests from the template.
# This workflow is NEVER a required check and NEVER runs on push/PR (FR-008, SC-007).
# Cadence contract: specs/005-ci-cadence-wiring/contracts/cadence-matrix.md (release row).
on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version to pack+publish (e.g. 0.1.51-preview.1). Required to actually push on a manual run; omit for a pack-only dry run."
        type: string
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package-tests:
    name: Package consumption (release-only)
    runs-on: ubuntu-latest
    # Restrict to the canonical repo: fork tags/dispatch never run this (no fork secret exposure, FR-013).
    if: github.repository == 'FS-GG/FS.GG.Rendering'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # Package.Tests is an exe test project outside the slnx; restore+build it directly.
      - name: Run Package.Tests
        run: dotnet test tests/Package.Tests/Package.Tests.fsproj -c Release

  template-product-tests:
    name: Generated product (template instantiation, release-only)
    runs-on: ubuntu-latest
    if: github.repository == 'FS-GG/FS.GG.Rendering'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # Exercise the real consumer path: install the in-repo `dotnet new` template, instantiate a
      # product, and run THAT generated product's tests (template/base/tests/Product.Tests becomes
      # the generated product's tests). This is gated on the instantiation tooling actually working
      # — a broken template or generated app fails here, which is exactly what this release-only
      # check exists to catch. We do NOT reference a top-level tests/Product.Tests (it does not exist).
      - name: Install template + instantiate generated product
        run: |
          set -euo pipefail
          dotnet new install .
          work="$(mktemp -d)"
          dotnet new fs-gg-ui --name GeneratedProduct --output "$work/GeneratedProduct"
          echo "PRODUCT_DIR=$work/GeneratedProduct" >> "$GITHUB_ENV"
      # Feature 212 (contract C4 / SC-005): prove the freshly scaffolded product is root-buildable
      # with the STOCK .NET CLI — no FAKE, no build.fsx knowledge — via the root <Name>.slnx, so a
      # future change that breaks stock dotnet build/test/run is caught at release time and blocks
      # the release. One config for all three (stock default/Debug), matching quickstart.md and what
      # an SDD composition-acceptance probe runs (stock declared-or-default commands); the live US1
      # smoke confirmed the stock default path. `dotnet run` exits 0 in this headless runner via the
      # entrypoint's UnsupportedEnvironment safe-degrade (research R4); `set -e` blocks on any failure.
      - name: Build, test, and run generated product (stock root, Feature 212)
        run: |
          set -euo pipefail
          dotnet build "$PRODUCT_DIR"
          dotnet test "$PRODUCT_DIR"
          dotnet run --project "$PRODUCT_DIR/src/GeneratedProduct"

  # DRAFT (FS-GG/.github#21/#22, epic #16 Pillar 4): the missing producer half of the auto-update
  # fabric. Renovate + org preset + read:packages auth are all wired and verified, but the org
  # GitHub Packages feed (nuget.pkg.github.com/FS-GG) is EMPTY — nothing ever publishes FS.GG.UI.*
  # to it, so every downstream lookup is "no-result". This job publishes the coherent set on a
  # release. GITHUB_TOKEN (packages: write) is sufficient to push to the same org's feed; no PAT.
  publish-packages:
    name: Publish FS.GG.UI.* to org GitHub Packages (release-only)
    runs-on: ubuntu-latest
    if: github.repository == 'FS-GG/FS.GG.Rendering'
    # Only publish a set that passed the release-only consumption checks above.
    needs: [package-tests, template-product-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve coherent-set version from the release tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            release)           raw="${{ github.event.release.tag_name }}" ;;
            push)              raw="${GITHUB_REF_NAME}" ;;
            workflow_dispatch) raw="${{ inputs.version }}" ;;
            *)                 raw="" ;;
          esac
          ver="${raw#v}"   # v0.1.51-preview.1 -> 0.1.51-preview.1
          if [[ -z "$ver" ]]; then
            echo "::notice::No version (manual run without input) — pack-only dry run, no push."
            echo "push=false" >> "$GITHUB_OUTPUT"
            ver="0.0.0-dryrun.${GITHUB_RUN_ID}"
          else
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Coherent-set version: $ver"

      # One coherent set: pack the whole solution + the template at the SAME version, exactly as
      # scripts/dev-repack.fsx does for the local feed (every FS.GG.UI.* + inter-package dep = V).
      - name: Pack FS.GG.UI.* (libraries + template)
        shell: bash
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          dotnet restore FS.GG.Rendering.slnx
          dotnet pack FS.GG.Rendering.slnx -c Release -p:Version="$VER" -o artifacts/packages
          dotnet pack .template.package/FS.GG.UI.Template.fsproj -c Release -p:Version="$VER" -o artifacts/packages
          echo "Packed:"; ls -1 artifacts/packages/*.nupkg

      - name: Push coherent set to nuget.pkg.github.com/FS-GG
        if: steps.ver.outputs.push == 'true'
        shell: bash
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source https://nuget.pkg.github.com/FS-GG/index.json \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
          echo "Published coherent set ${{ steps.ver.outputs.version }} to the org feed."
