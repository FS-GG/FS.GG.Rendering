name: gate

# The required pre-merge gate. Fast, deterministic, runs on every change. Branch protection
# requires THIS workflow and only this one (see docs/ci/cadence-map.md §5).
# Contracts: specs/005-ci-cadence-wiring/contracts/{gate-contract,run-summary.schema}.md
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Superseded pushes/PRs cancel in-flight runs so a stale red/green never misleads (Edge Case:
# concurrent pushes). PR runs key off the PR ref; branch pushes off the branch ref.
concurrency:
  group: gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# No privileged secrets are used, so fork PRs run and get a real signal (FR-001, FR-013).
permissions:
  contents: read

jobs:
  gate:
    name: Deterministic gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # T015/T029 (Feature 209, D2) — the version-coherence guard reads `git tag --list
        # 'fs-gg-ui/v*'`; without full history/tags `git tag` is empty and the guard fails
        # closed (exit 2). fetch-depth: 0 makes the snapshot tags visible.
        with:
          fetch-depth: 0

      # SDK pinning decision: docs/ci/cadence-map.md §1 (no global.json in repo).
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # 211 (FR-002/FR-004) — locked restore against committed packages.lock.json. On a graph that
      # differs from the lockfile (or an un-pinnable version, NU1603) restore fails and the gate
      # blocks. The RestoreLockedMode property (Directory.Build.props) makes the repo behave like the
      # generated products; --locked-mode here forces it explicitly and gives one clear place to point
      # at the regenerate command. This is the single restore enforcement point (the build below uses
      # --no-restore), so NU1603/NU1608 promotion is anchored here.
      - name: Restore (locked)
        run: |
          set -euo pipefail
          if ! dotnet restore FS.GG.Rendering.slnx --locked-mode; then
            echo "::error::locked restore failed — the resolved graph does not match the committed packages.lock.json (or a version was substituted, NU1603). If this is an intentional dependency change, run: dotnet restore FS.GG.Rendering.slnx --force-evaluate  and commit the updated lockfiles."
            exit 1
          fi

      # T007 (FR-002) — a build failure MUST fail the gate. Debug so test/harness steps reuse it
      # with --no-build. The slnx contains src + all local-tier tests + the harness; it does NOT
      # contain Package.Tests (release-only), so no release check can leak into the gate.
      # --no-restore: restore already happened in the locked step above (FR-002, GR3) — exactly once.
      - name: Build solution (net10.0)
        run: dotnet build FS.GG.Rendering.slnx -c Debug --no-restore

      # T013 (US2, FR-005/FR-010) — classify the runner (display? GL?) up front; the GL-dependent
      # steps key off this output rather than guessing. Informational: probe never gates.
      - name: Probe runner capability
        id: probe
        uses: ./.github/actions/harness-evidence
        with:
          subcommand: probe
          cadence: gate
          label: probe (runner capability)
          out: artifacts/harness/probe
          artifact-name: harness-probe
          # required-tiers intentionally empty: probe is informational, never gates.

      # T008 (FR-002/FR-003) — the default local deterministic tier (capability `none`). Any
      # failure MUST fail the gate. --no-build reuses the Debug build above.
      - name: Default local tier (deterministic)
        run: |
          set -euo pipefail
          for p in Scene Layout KeyboardInput Elmish Controls Diagnostics Testing Lib; do
            echo "::group::dotnet test tests/${p}.Tests"
            dotnet test "tests/${p}.Tests/${p}.Tests.fsproj" -c Debug --no-build
            echo "::endgroup::"
          done

      # T009 (FR-003) — public .fsi surface-drift across all 9 committed baselines. Regenerate in
      # place and fail on ANY uncommitted change: a modified baseline = surface drift; an untracked
      # new baseline = a package gained a surface with no committed baseline (the spec's
      # "first run with no baseline" edge — fails, never silently passes). The generator writes
      # directly to readiness/surface-baselines/ (the single authoritative location the live gate
      # `SurfaceAreaTests` reads), so this is the canonical regenerate-then-git-diff check.
      - name: Surface-baseline drift (.fsi)
        run: |
          set -euo pipefail
          dotnet fsi scripts/refresh-surface-baselines.fsx
          if ! git diff --quiet -- readiness/surface-baselines; then
            echo "::error::public .fsi surface drift — run scripts/refresh-surface-baselines.fsx and commit the updated baselines."
            git --no-pager diff -- readiness/surface-baselines
            exit 1
          fi
          untracked="$(git ls-files --others --exclude-standard -- readiness/surface-baselines)"
          if [ -n "$untracked" ]; then
            echo "::error::new public surface baseline(s) not committed (first-run-with-no-baseline fails the gate):"
            echo "$untracked"
            exit 1
          fi
          echo "no .fsi surface drift across $(ls readiness/surface-baselines/*.txt | wc -l) committed baselines"

      # Feature 209 (T015/T029/T031, FR-001..009) — version-staleness / coherence guard. Mirrors the
      # surface-baseline "regenerate-and-fail-on-drift" pattern above. Runs BOTH layers merge-blocking:
      #   * structural verdict-core (env-free): pin matches an existing fs-gg-ui/v* tag and does not lag
      #     the latest (preview-aware), single [$version$] BOM token, B.ids==P.members, template pins all
      #     derive through $(FsGgUiVersion) == the 11-member manifest, build.fsx regex still resolves —
      #     independent of any warnings-as-errors policy (FR-004).
      #   * scoped restore-grounded proof (FS_GG_RUN_VERSION_COHERENCE_SMOKE=1): one Release pack + one
      #     clean restore of FS.GG.UI@V asserting the COMPLETE 16-member set resolves to exactly V
      #     (FR-008, anti-text-grep). The deeper product-from-template build stays on release.yml.
      # Non-zero exit (1 drift / 2 guard-error) fails the gate ⇒ PR blocked from merging to main. The
      # script echoes the DRIFT lines to $GITHUB_STEP_SUMMARY on failure (SC-006).
      - name: Version coherence guard
        run: |
          set -euo pipefail
          dotnet fsi scripts/validate-version-coherence.fsx
          FS_GG_RUN_VERSION_COHERENCE_SMOKE=1 dotnet fsi scripts/validate-version-coherence.fsx

      # T010 (FR-003) — fsdocs site build in STRICT mode so FsDocsWarnOnMissingDocs (Directory.Build.props)
      # is fatal: a broken docs build OR a missing-doc stub fails the gate. Build only, no publish.
      - name: Docs build (fsdocs, strict)
        run: |
          set -euo pipefail
          dotnet tool install --global fsdocs-tool
          export PATH="$PATH:$HOME/.dotnet/tools"
          # The global tool installs a `fsdocs` command (not a `dotnet-fsdocs` shim), so invoke it
          # directly — `dotnet fsdocs` looks for a nonexistent `dotnet-fsdocs` and fails.
          fsdocs build --strict

      # T011 (FR-004) + T015 (FR-005/FR-011) — ONE offscreen invocation emits T0/run.json and
      # T1/run.json. The action reads each tier's run.json.status (NOT the aggregate process exit
      # code, which is 1 whenever T1 is cleanly skipped). T0 is required; T1 is advisory and a
      # headless skip discloses under notProvedHere without reddening the gate.
      - name: Harness offscreen (T0 required, T1 advisory)
        uses: ./.github/actions/harness-evidence
        with:
          subcommand: offscreen
          required-tiers: T0
          cadence: gate
          label: harness offscreen (T0 det / T1 readback)
          out: artifacts/harness/offscreen
          artifact-name: harness-offscreen

      # T014 (FR-005/FR-010/FR-011) — GL-dependent local checks. On a headless runner (no hardware
      # GL) they are SKIPPED with a written, machine-readable rationale and never affect pass/fail.
      # When GL is present they run and a real failure fails the gate. A misconfiguration (GL claimed
      # present but the test harness itself errors) surfaces as a real failure with probe facts, not
      # a silent skip.
      - name: GL local checks (SkiaViewer + Smoke) — degrade & disclose
        env:
          GL_PRESENT: ${{ steps.probe.outputs.gl }}
        run: |
          set -euo pipefail
          if [ "$GL_PRESENT" != "present" ]; then
            {
              echo "### Proof scope — GL local checks (cadence: gate)"
              echo ""
              echo "**notProvedHere:**"
              echo "- SkiaViewer.Tests, Smoke.Tests — rationale: \"no hardware GL on hosted runner\" (probe: gl=${GL_PRESENT}); not run, not failed."
              echo ""
              echo "**overall (GL local checks): evidence-only (skipped, disclosed)**"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            echo "GL absent (probe gl=${GL_PRESENT}); SkiaViewer.Tests + Smoke.Tests skipped-with-rationale, gate unaffected."
            exit 0
          fi
          echo "GL present; running GL-dependent local checks."
          for p in SkiaViewer Smoke; do
            echo "::group::dotnet test tests/${p}.Tests"
            dotnet test "tests/${p}.Tests/${p}.Tests.fsproj" -c Debug --no-build
            echo "::endgroup::"
          done
          {
            echo "### Proof scope — GL local checks (cadence: gate)"
            echo ""
            echo "**proved:**"
            echo "- SkiaViewer.Tests, Smoke.Tests (GL present on this runner)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # API compatibility gate (H3 / FS-GG/.github#20, epic FS-GG/.github#16 Pillar 5). Packs each
  # IsPackable FS.GG.UI.* project and compares it against its published baseline on the org GitHub
  # Packages feed via the .NET SDK's Package Validation / ApiCompat — the F#-viable detector
  # (Microsoft.CodeAnalysis.PublicApiAnalyzers is C#-only). A removed/changed public member is a
  # break that must force a SemVer major (registry coherence id `apicompat-publicapi-gate`).
  #
  # ADVISORY: a SEPARATE, non-required job (continue-on-error) — it never blocks the merge or
  # reddens the required `gate` job above (Package Validation stays OFF in the normal build/release).
  # The detector script exits non-zero on a real break, so promotion to REQUIRED is a one-line flip:
  # drop `continue-on-error` and add this job to branch-protection required checks (once the surface
  # is stable). It reads the feed with GITHUB_TOKEN (packages: read); on a fork PR (no token) the
  # script degrades to advisory-clean.
  api-compatibility-gate:
    name: API compatibility gate (breaking-change → SemVer major) [advisory]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: ApiCompat vs feed baseline (advisory)
        env:
          NUGET_FEED_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_FEED_USER: ${{ github.actor }}
        run: bash scripts/apicompat-check.sh
